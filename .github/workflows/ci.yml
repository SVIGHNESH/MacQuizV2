# CI per docs/09-deployment.md section 5: on pull request run lint and tests.
# Postgres/Redis service containers and the frontend job are added when the
# milestones that need them land.
name: CI

on:
  pull_request:
  push:
    branches: [master]

jobs:
  server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
      - name: gofmt
        run: test -z "$(gofmt -l .)" || (gofmt -l . && exit 1)
      - name: go vet
        run: go vet ./...
      - name: go test
        run: go test ./...
      - name: go build
        run: go build ./...
