# CI per docs/09-deployment.md section 5: on pull request run lint and tests.
# The Redis service container is added when the milestone that needs it lands.
name: CI

on:
  pull_request:
  push:
    branches: [master]

jobs:
  server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: macquiz
          POSTGRES_PASSWORD: macquiz
          POSTGRES_DB: macquiz
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U macquiz -d macquiz"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      MACQUIZ_TEST_DATABASE_URL: postgres://macquiz:macquiz@localhost:5432/macquiz?sslmode=disable
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
      - name: gofmt
        run: test -z "$(gofmt -l .)" || (gofmt -l . && exit 1)
      - name: go vet
        run: go vet ./...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
          working-directory: server
      - name: go test
        run: go test ./...
      - name: go build
        run: go build ./...

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: install
        run: npm ci
      - name: generated API client is in sync with api/openapi.yaml
        run: |
          npm run generate:api
          git diff --exit-code -- src/api/schema.d.ts
      - name: lint
        run: npm run lint
      - name: typecheck and build
        run: npm run build
