# CI per docs/09-deployment.md section 5: on pull request run lint and tests.
# Redis service container and the frontend job are added when the milestones
# that need them land.
name: CI

on:
  pull_request:
  push:
    branches: [master]

jobs:
  server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: macquiz
          POSTGRES_PASSWORD: macquiz
          POSTGRES_DB: macquiz
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U macquiz -d macquiz"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      MACQUIZ_TEST_DATABASE_URL: postgres://macquiz:macquiz@localhost:5432/macquiz?sslmode=disable
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
      - name: gofmt
        run: test -z "$(gofmt -l .)" || (gofmt -l . && exit 1)
      - name: go vet
        run: go vet ./...
      - name: go test
        run: go test ./...
      - name: go build
        run: go build ./...
