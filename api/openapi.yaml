# MacQuiz v2 API contract (docs/04-api.md).
# Spec-first: oapi-codegen generates the Go server interfaces and the
# TypeScript client from this file, so frontend and backend cannot drift.
# Endpoints are added milestone by milestone; today it covers Milestone 0,
# Milestone 1 (auth flow, admin user provisioning, groups), Milestone 2
# (quiz authoring: draft quiz CRUD, question CRUD, reorder), Milestone 3
# (publish with snapshot + versioning, assignments, the teacher-readable
# audience directory, student quiz list), and Milestone 4 (the attempt
# player: start, resume, autosave, manual submit, and results release:
# publish-time release policy, the teacher results table and explicit
# release, and the student's released review).
openapi: 3.0.3
info:
  title: MacQuiz v2 API
  description: Quiz platform for admins, teachers, and students.
  version: 0.16.0
servers:
  - url: /
paths:
  /healthz:
    get:
      operationId: getHealth
      summary: Dependency health check
      description: >-
        Checks database connectivity, Redis connectivity, and River queue lag
        (docs/10-operations.md section 2); polled by external uptime
        monitoring. Returns 503 if a wired dependency is unreachable.
      responses:
        "200":
          description: Healthy.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"
        "503":
          description: A dependency is unreachable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"
  /readyz:
    get:
      operationId: getReady
      summary: Readiness check
      description: Reports whether the process can serve traffic (Postgres answers).
      responses:
        "200":
          description: Ready.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ready"
        "503":
          description: Not ready; keep traffic away.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ready"
  /deploy-check:
    get:
      operationId: getDeployCheck
      summary: Pre-deploy safety check
      description: >-
        Reports whether it is safe to roll out a new image right now
        (docs/10-operations.md section 4: "deploys are refused while any
        quiz is live"). The deploy pipeline polls this before pulling and
        restarting the app/worker containers. A quiz counts as live if its
        effective status - including a still-"scheduled" row whose starts_at
        has already passed but has not yet been flipped by the scheduler
        job - is live.
      responses:
        "200":
          description: No quiz is live; safe to deploy.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeployCheck"
        "409":
          description: A quiz is live; deploy is refused.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeployCheck"
        "503":
          description: Could not determine deploy safety (database unreachable).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeployCheck"
  /api/v1/auth/login:
    post:
      operationId: login
      summary: Log in with email and password
      description: >-
        Verifies the credential and opens a session. The access token (15 min
        JWT) and rotating refresh token are set as httpOnly cookies; the body
        carries only the user. Rate-limited per IP and per account.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Session opened; cookies set.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationFailed"
        "429":
          $ref: "#/components/responses/RateLimited"
  /api/v1/auth/refresh:
    post:
      operationId: refreshSession
      summary: Rotate the refresh token and mint a new access token
      description: >-
        Uses the refresh cookie. Presenting an already-used or revoked token
        is treated as theft and revokes the whole session family.
      responses:
        "200":
          description: Session rotated; new cookies set.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/v1/auth/logout:
    post:
      operationId: logout
      summary: Revoke the session and clear cookies
      responses:
        "204":
          description: Session revoked. Always succeeds, even without a session.
  /api/v1/auth/me:
    get:
      operationId: getMe
      summary: The authenticated account
      responses:
        "200":
          description: The caller's account.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/v1/auth/password:
    post:
      operationId: changePassword
      summary: Change the caller's password
      description: >-
        Verifies the current password, stores the new one, clears the forced
        first-login reset flag, and revokes every session; the client logs in
        again with the new credential.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordRequest"
      responses:
        "204":
          description: Password changed; all sessions revoked, cookies cleared.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationFailed"
  /api/v1/users:
    get:
      operationId: listUsers
      summary: List accounts (admin)
      parameters:
        - name: role
          in: query
          schema:
            type: string
            enum: [admin, teacher, student]
        - name: status
          in: query
          schema:
            type: string
            enum: [active, disabled]
      responses:
        "200":
          description: Accounts, newest first.
          content:
            application/json:
              schema:
                type: object
                required: [users]
                properties:
                  users:
                    type: array
                    items:
                      $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationFailed"
    post:
      operationId: createUser
      summary: Provision a teacher or student (admin)
      description: >-
        Creates the account with a generated one-time credential, returned
        exactly once in this response. The account must change its password
        on first login before any other endpoint works. Admin accounts are
        created only by the operator bootstrap, never over the API.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: Account created; initial_password appears only here.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProvisionedUser"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationFailed"
  /api/v1/users/{id}:
    patch:
      operationId: updateUser
      summary: Deactivate, reset the credential, or edit an account (admin)
      description: >-
        Disabling an account or resetting its credential revokes every live
        session immediately. Admins cannot disable or reset themselves here;
        that path goes through the auth endpoints. Each mutation writes an
        audit row in the same transaction.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200":
          description: >-
            The updated account; initial_password is present only when
            reset_password was requested.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProvisionedUser"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationFailed"
  /api/v1/groups:
    get:
      operationId: listGroups
      summary: List cohorts with member counts (admin)
      responses:
        "200":
          description: Cohorts, newest first.
          content:
            application/json:
              schema:
                type: object
                required: [groups]
                properties:
                  groups:
                    type: array
                    items:
                      $ref: "#/components/schemas/Group"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      operationId: createGroup
      summary: Create a cohort (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
      responses:
        "201":
          description: Cohort created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationFailed"
  /api/v1/groups/{id}/members:
    get:
      operationId: getGroupMembers
      summary: Read a cohort's current roster (admin)
      description: >-
        The read side of setGroupMembers - the membership editor loads this
        before showing a pre-checked picker, since PUT replaces the whole
        set rather than diffing against it.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: The cohort's current members.
          content:
            application/json:
              schema:
                type: object
                required: [students]
                properties:
                  students:
                    type: array
                    items:
                      $ref: "#/components/schemas/AssignedStudent"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      operationId: setGroupMembers
      summary: Replace a cohort's membership (admin)
      description: >-
        Replaces the membership with exactly student_ids, validated and
        swapped in one transaction - a single bad id changes nothing. An
        empty list clears the cohort.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [student_ids]
              properties:
                student_ids:
                  type: array
                  items:
                    type: string
                    format: uuid
      responses:
        "200":
          description: Membership replaced.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationFailed"
  /api/v1/directory:
    get:
      operationId: getDirectory
      summary: Students and cohorts for the audience picker (teacher, admin)
      description: >-
        The minimal directory a teacher needs to assign a quiz - every
        active student and every cohort, name-sorted. No account status,
        credential facts, or teacher rows; students cannot read it.
      responses:
        "200":
          description: The assignable audience.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DirectoryResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/v1/audit:
    get:
      operationId: listAuditLog
      summary: Filterable audit log (admin)
      description: >-
        Reads the append-only audit trail newest first, keyset-paginated on the
        entry id. Every filter is optional; combine actor_id, action,
        resource_type, resource_id, and an at range (from/to), then page with
        before + limit. next_cursor carries the id to pass back as before for
        the next page, and is null on the last page. Admin-only.
      parameters:
        - name: actor_id
          in: query
          description: Only entries written by this account.
          schema:
            type: string
            format: uuid
        - name: action
          in: query
          description: Exact action match, e.g. quizzes.published.
          schema:
            type: string
        - name: resource_type
          in: query
          description: Exact resource type, e.g. quiz, attempt, question.
          schema:
            type: string
        - name: resource_id
          in: query
          description: Only entries touching this resource.
          schema:
            type: string
            format: uuid
        - name: from
          in: query
          description: Inclusive lower bound on the entry time (at >= from).
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          description: Exclusive upper bound on the entry time (at < to).
          schema:
            type: string
            format: date-time
        - name: before
          in: query
          description: Keyset cursor - return entries with id strictly below this.
          schema:
            type: integer
            format: int64
            minimum: 1
        - name: limit
          in: query
          description: Page size, 1..200 (default 50).
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
      responses:
        "200":
          description: A page of audit entries, newest first.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditPage"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationFailed"
  /api/v1/quizzes:
    get:
      operationId: listQuizzes
      summary: List the caller's own quizzes (teacher)
      description: Newest first, with question counts. Authoring is teacher-only.
      responses:
        "200":
          description: The caller's quizzes.
          content:
            application/json:
              schema:
                type: object
                required: [quizzes]
                properties:
                  quizzes:
                    type: array
                    items:
                      $ref: "#/components/schemas/Quiz"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      operationId: createQuiz
      summary: Create a draft quiz (teacher)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title:
                  type: string
      responses:
        "201":
          description: Draft created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuizResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationFailed"
  /api/v1/quizzes/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      operationId: getQuiz
      summary: One quiz with its full question list (owner)
      description: >-
        Owner-only; the questions include the answer keys. Non-owners get
        404, never 403, so quiz existence is not leaked.
      responses:
        "200":
          description: The quiz and its questions in position order.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuizDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateQuiz
      summary: Edit draft settings (owner)
      description: >-
        Title, max_attempts, and shuffle_questions are editable while the
        quiz is a draft. Windows, duration, and guardrails are set at
        publish time.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateQuizRequest"
      responses:
        "200":
          description: The updated quiz.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuizResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/NotEditable"
        "422":
          $ref: "#/components/responses/ValidationFailed"
    delete:
      operationId: deleteQuiz
      summary: Delete a draft quiz and its questions (owner)
      description: >-
        Drafts only. Quizzes that ever left draft are never deleted -
        attempts may reference them; archiving is their retirement path.
      responses:
        "204":
          description: Draft deleted.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/NotEditable"
  /api/v1/quizzes/{id}/questions:
    post:
      operationId: addQuestion
      summary: Add a question to a draft quiz (owner)
      description: >-
        Validated per type - a correct answer must exist among the options,
        points > 0, choice types need 2-8 options. The question is appended
        at the end of the running order.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuestionInput"
      responses:
        "201":
          description: Question added.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuestionResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/NotEditable"
        "422":
          $ref: "#/components/responses/ValidationFailed"
  /api/v1/quizzes/{id}/questions/order:
    put:
      operationId: reorderQuestions
      summary: Reorder a draft quiz's questions (owner)
      description: >-
        question_ids must list every question of the quiz exactly once; the
        API rewrites dense positions to match and returns the questions in
        the new order.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [question_ids]
              properties:
                question_ids:
                  type: array
                  items:
                    type: string
                    format: uuid
      responses:
        "200":
          description: Questions in the new order with rewritten positions.
          content:
            application/json:
              schema:
                type: object
                required: [questions]
                properties:
                  questions:
                    type: array
                    items:
                      $ref: "#/components/schemas/TeacherQuestion"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/NotEditable"
        "422":
          $ref: "#/components/responses/ValidationFailed"
  /api/v1/quizzes/{id}/imports:
    post:
      operationId: registerImport
      summary: Register a bulk upload for a draft quiz (owner)
      description: >-
        docs/07 section 2 step 2: the request body is the raw CSV template
        (docs/07 section 2 step 1); the API stores it, creates the imports
        row in status "validating", and enqueues the import_validate worker
        job. Nothing is written to questions here - see POST
        /imports/{id}/commit once the worker resolves the import to "ready".
        Limit: 10 MB.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          text/csv:
            schema:
              type: string
              format: binary
      responses:
        "201":
          description: Import registered and queued for validation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/NotEditable"
        "422":
          $ref: "#/components/responses/ValidationFailed"
  /api/v1/imports/{id}:
    get:
      operationId: getImport
      summary: Get a bulk import's status and error report (owner)
      description: >-
        docs/07 section 2 step 4: the review UI polls this to watch an
        import move from "validating" to "ready" or "failed", and to read
        the row-level error_report once it fails.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: The import.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/imports/{id}/commit:
    post:
      operationId: commitImport
      summary: Commit a validated import transactionally (owner)
      description: >-
        docs/07 section 2 step 5: only an import in status "ready" may be
        committed. Inserts every parsed row as an ordinary question tagged
        source "import" with import_id for provenance, all in one
        transaction, then flips the import to "committed". The quiz must
        still be a draft, the same gate as one-by-one authoring.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: The committed import and the questions it inserted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommitImportResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: >-
            Either QUIZ_NOT_EDITABLE (the quiz left draft) or
            IMPORT_NOT_READY (the import is not status "ready").
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/quizzes/{id}/publish:
    post:
      operationId: publishQuiz
      summary: Publish a quiz - snapshot, version, window, guardrails (owner)
      description: >-
        Transitions Draft to Scheduled. Snapshots the question set and the
        guardrail config into an immutable version and stamps the live
        window. Preconditions - at least one question, starts_at < ends_at
        and in the future, a duration, at least one assigned student.
        Publishing an already-scheduled quiz reschedules it and writes
        version n+1; live and later states answer 409.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PublishQuizRequest"
      responses:
        "200":
          description: The quiz, now scheduled at its new version.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuizResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/NotEditable"
        "422":
          $ref: "#/components/responses/ValidationFailed"
  /api/v1/quizzes/{id}/close:
    post:
      operationId: forceCloseQuiz
      summary: Force-close a live quiz early (owner)
      description: >-
        Ends a live or scheduled quiz immediately instead of waiting for
        ends_at. Flips the quiz to Closed and pulls ends_at forward to now,
        then runs the same close chain a timed close would - every still-open
        attempt is force-submitted (kind=forced), graded, and results release
        per policy. Owner-teacher only. Re-closing an already-closed or
        archived quiz is an idempotent no-op that returns the quiz unchanged;
        a draft (never opened) answers 409 QUIZ_NOT_LIVE.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: The quiz, now closed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuizResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: >-
            QUIZ_NOT_LIVE - the quiz is a draft and was never opened, so there
            is nothing to force-close.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/quizzes/{id}/extend:
    post:
      operationId: extendQuiz
      summary: Extend a live quiz's ends_at (owner)
      description: >-
        Moves a live quiz's ends_at later. In-progress attempts whose personal
        deadline was clamped to the old window get that time back
        (deadline_at = least(started_at + duration, new ends_at)); because the
        window only ever moves later, no attempt is submitted early. Owner-
        teacher only. A quiz that is not effectively live (draft, not-yet-
        started, or already closed/archived - use reschedule while scheduled)
        answers 409 QUIZ_NOT_LIVE; a new ends_at at or before the current one,
        or not in the future, is a 422.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ends_at]
              properties:
                ends_at:
                  type: string
                  format: date-time
                  description: The new close time; must be in the future and later than the current ends_at.
      responses:
        "200":
          description: The quiz, with the extended ends_at.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuizResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: >-
            QUIZ_NOT_LIVE - the quiz is not effectively live, so ends_at cannot
            be extended.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          $ref: "#/components/responses/ValidationFailed"
  /api/v1/quizzes/{id}/archive:
    post:
      operationId: archiveQuiz
      summary: Archive a closed quiz (owner)
      description: >-
        Retires a closed quiz to the terminal, read-only Archived state
        (analytics are retained). A pure status flip with no worker chain - a
        closed quiz's attempts are already force-submitted and graded. Owner-
        teacher only. Archiving an already-archived quiz is an idempotent no-op
        that returns the quiz unchanged; a draft, scheduled, or live quiz
        (not yet closed - force-close it first) answers 409 QUIZ_NOT_CLOSED.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: The quiz, now archived.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuizResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: >-
            QUIZ_NOT_CLOSED - the quiz is not closed, so it cannot be archived.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/quizzes/{id}/assignments:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      operationId: listAssignments
      summary: The quiz's current audience (owner)
      responses:
        "200":
          description: The assigned students.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssignmentsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      operationId: setAssignments
      summary: Replace the quiz's audience (owner)
      description: >-
        Group ids are expanded to individual student rows at assignment
        time, so later group edits never silently revoke an already-assigned
        quiz. Atomic - one bad id changes nothing. Allowed while draft or
        scheduled; a live quiz's audience is frozen.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetAssignmentsRequest"
      responses:
        "200":
          description: The resulting audience, group-expanded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssignmentsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/NotEditable"
        "422":
          $ref: "#/components/responses/ValidationFailed"
  /api/v1/quizzes/{id}/results:
    get:
      operationId: listQuizResults
      summary: Per-student results table (owner)
      description: >-
        One row per assigned student per attempt; students who never started
        keep the attempt fields null. The owner sees scores as grading lands,
        before any release - releasing is their decision, so they need the
        numbers first. max_score comes from the snapshot version each
        attempt pinned.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: The quiz and its results table.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuizResultsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/quizzes/{id}/results.csv:
    get:
      operationId: exportQuizResultsCsv
      summary: Per-student results table as a downloadable CSV (owner)
      description: >-
        docs/07 section 4's "CSV exports": the same rows as GET
        /quizzes/:id/results, one line per assigned student per attempt,
        rendered as text/csv with a Content-Disposition attachment header
        instead of JSON. Reuses the same read as the JSON view, so the two
        can never disagree.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: The results table as a CSV file.
          content:
            text/csv:
              schema:
                type: string
                format: binary
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/quizzes/{id}/release-results:
    post:
      operationId: releaseResults
      summary: Release results to students (owner)
      description: >-
        Stamps results_released_at, the fact every student results read
        gates on. Requires the quiz's window to have ended (409
        QUIZ_NOT_CLOSED otherwise); releasing an already-released quiz is an
        idempotent no-op. Quizzes published with release_policy auto are
        released by the worker at close without this call.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: The quiz with results_released_at set.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuizResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/QuizNotClosed"
  /api/v1/quizzes/{id}/live:
    get:
      operationId: getLiveRoster
      summary: Live roster snapshot (owner or admin)
      description: >-
        The roster the teacher dashboard fetches on connect before applying
        streamed deltas. One row per assigned student, collapsed to their
        latest attempt (max attempt_no), so a student is in exactly one roster
        state. Authorization is the owning teacher or any admin; a non-owning
        teacher gets 404. server_time is the database clock the row timestamps
        were read against, so every client-side countdown shares one origin.
        current_question is the 1-based ordinal of the last question the
        student saved an answer for; "disconnected" reflects the attempt's
        most recent heartbeat gap (docs/05 section 5) at the moment of this
        snapshot.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: The quiz and its live roster.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LiveRosterResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/analytics/quizzes/{id}:
    get:
      operationId: getQuizStats
      summary: Quiz stats and item analysis (owner or admin)
      description: >-
        docs/04 section 2: the rolled-up quiz_stats row RollupDue computed on
        close - score distribution, mean/median/participation, per-question
        item analysis, and the integrity summary. 404 until the rollup has
        run (the quiz is still open, or the close sweep has not reached it
        yet) as well as for a non-owning teacher.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: The quiz's rolled-up analytics.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuizStats"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/analytics/students/{id}:
    get:
      operationId: getStudentStats
      summary: Student performance profile (self, assigned teacher, or admin)
      description: >-
        docs/04 section 2: a student's cross-quiz rollup - accuracy trend,
        average time per question, completion rate. Visible to the student
        themselves, a teacher who has them assigned, or an admin; every other
        caller, and a student with no rollup yet, reads 404.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: The student's rolled-up analytics.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentStats"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/analytics/teachers/{id}:
    get:
      operationId: getTeacherStats
      summary: Teacher activity and outcomes (admin or self)
      description: >-
        docs/07 section 4: a teacher's activity-and-outcomes summary,
        aggregated live from quizzes/attempts/quiz_stats rather than from a
        rollup table. Visible to that teacher themselves or an admin; a
        non-teacher id or any other caller reads 404.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: The teacher's activity-and-outcomes summary.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeacherStats"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/analytics/org:
    get:
      operationId: getOrgStats
      summary: Org-wide dashboard (admin)
      description: >-
        docs/07 section 4 (FR-9): active users by role, a 12-week
        quizzes-created trend, platform-wide participation, and a per-group
        cohort comparison. Computed live from small, already-indexed
        aggregates rather than a rollup table. Admin-only; every other caller
        reads 403.
      responses:
        "200":
          description: The org-wide dashboard.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrgStats"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/v1/quizzes/assigned:
    get:
      operationId: listAssignedQuizzes
      summary: Upcoming, live, and past quizzes for the caller (student)
      description: >-
        Visibility is the assignment row itself; drafts and archived quizzes
        never appear. Status is derived from the window on read, so a quiz
        whose starts_at has passed reads live even before the scheduler job
        flips the row.
      responses:
        "200":
          description: The caller's assigned quizzes, soonest first.
          content:
            application/json:
              schema:
                type: object
                required: [quizzes]
                properties:
                  quizzes:
                    type: array
                    items:
                      $ref: "#/components/schemas/AssignedQuiz"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/v1/quizzes/{id}/attempts:
    post:
      operationId: startAttempt
      summary: Start (or resume) an attempt (student)
      description: >-
        One transaction checks assignment, the live window (server time),
        and attempts used against max_attempts, then precomputes
        deadline_at = least(now() + duration, ends_at). Returns the snapshot
        question set WITHOUT the answer key. If an unexpired attempt is
        already in progress it is returned with 200 instead of burning an
        attempt slot; unassigned callers read 404.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "201":
          description: A fresh attempt with its player payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttemptDetail"
        "200":
          description: The still-open attempt was resumed instead.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttemptDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/AttemptConflict"
  /api/v1/attempts/{id}:
    get:
      operationId: resumeAttempt
      summary: Resume an attempt (owner)
      description: >-
        The saved answers, the deadline, and the current server time - the
        client countdown is cosmetic, driven by server deadline plus a
        clock-offset estimate. Owner-only; anyone else reads 404.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: The full player payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttemptDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/attempts/{id}/answers/{questionId}:
    put:
      operationId: saveAnswer
      summary: Autosave one answer (owner)
      description: >-
        Idempotent upsert on (attempt_id, question_id); the question must
        belong to the snapshot version this attempt pinned. Refused with 409
        once now() passes deadline_at + 5 s grace or the attempt has left
        in_progress - the same gate that guards submit.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: questionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveAnswerRequest"
      responses:
        "200":
          description: The stored answer plus the deadline and server clock.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SaveAnswerResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/AttemptConflict"
        "422":
          $ref: "#/components/responses/ValidationFailed"
  /api/v1/attempts/{id}/submit:
    post:
      operationId: submitAttempt
      summary: Submit the attempt (owner)
      description: >-
        The manual leg of the idempotent submit funnel - whatever is
        autosaved becomes the submission. Submitting an already-submitted
        attempt answers 200 with the unchanged terminal state, so a retried
        request or a race against the deadline job resolves cleanly.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: The attempt in its terminal state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttemptResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/AttemptConflict"
  /api/v1/attempts/{id}/events:
    post:
      operationId: reportAttemptViolation
      summary: Report a guardrail violation (owner student)
      description: >-
        The REST fallback for the attempt socket: the student's own client
        reports one guardrail violation. Only a guardrail whose snapshotted
        policy is `count` increments `violation_count` (the tally the roster
        badge and the violation ladder read); a `warn` report and a clipboard
        block (logged) are still recorded and broadcast as evidence but leave
        the count untouched. There is no dedup - one request is one violation.
        A report for a guardrail switched off in this attempt's snapshot answers
        409 GUARDRAIL_OFF; a report against a terminated attempt answers its
        terminal 409. Owner-only; anyone else reads 404.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type]
              properties:
                type:
                  type: string
                  enum: [fullscreen, focus, clipboard]
                  description: The guardrail the violation is reported against.
                duration_ms:
                  type: integer
                  minimum: 0
                  nullable: true
                  description: Optional duration of the violation (e.g. focus-loss length).
      responses:
        "200":
          description: The attempt with its updated count, and whether the report counted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ViolationResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: >-
            GUARDRAIL_OFF - the reported guardrail is not enabled for this
            attempt; or a terminal ATTEMPT_KICKED / ATTEMPT_ALREADY_SUBMITTED.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          $ref: "#/components/responses/ValidationFailed"
  /api/v1/attempts/{id}/kick:
    post:
      operationId: kickAttempt
      summary: Remove a student from a live attempt (owner or admin)
      description: >-
        Server-authoritative removal of a candidate from a live attempt. One
        transaction flips the attempt to the terminal `kicked` state, records
        who kicked it and why, and enqueues grading of whatever was autosaved
        (kicked work is graded, not discarded). Enforcement is the status flip,
        not the socket: the kicked student's every later autosave and submit
        answers 409 ATTEMPT_KICKED. Idempotent - a repeat kick, or one that
        lost the race to a submit, answers 200 with the unchanged terminal
        state. Policy: the quiz owner or any admin; a non-owning teacher reads
        404, so an attempt's existence never leaks. The reason is required.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason:
                  type: string
                  minLength: 1
                  description: Why the student was removed (canned phrase plus optional free text).
      responses:
        "200":
          description: The attempt in its terminal (kicked, or race-won) state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttemptResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationFailed"
  /api/v1/attempts/{id}/readmit:
    post:
      operationId: readmitAttempt
      summary: Grant a kicked student one fresh attempt slot (owner or admin)
      description: >-
        Re-admission is a new attempt, not a resurrection: it grants the kicked
        student one extra attempt slot so they can start fresh with whatever
        time remains, while the kicked attempt stays terminal and immutable in
        the record. The target must be a kicked attempt (else 409
        ATTEMPT_NOT_KICKED). Audited and idempotent - a repeat readmit of the
        same attempt answers 200 without granting a second slot or writing a
        second audit row. Policy: the quiz owner or any admin; a non-owning
        teacher reads 404, so an attempt's existence never leaks. The reason is
        required.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason:
                  type: string
                  minLength: 1
                  description: Why the student is being readmitted (canned phrase plus optional free text).
      responses:
        "200":
          description: The kicked attempt, unchanged; the extra slot is now granted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttemptResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: >-
            ATTEMPT_NOT_KICKED - the target attempt was never kicked, so there
            is nothing to readmit.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          $ref: "#/components/responses/ValidationFailed"
  /api/v1/attempts/{id}/override-score:
    post:
      operationId: overrideAttemptScore
      summary: Zero a kicked attempt's score once it is graded (owner or admin)
      description: >-
        Results are flagged `kicked` wherever scores appear; this endpoint
        lets the teacher additionally override the score itself to zero
        (docs/06 line 80). The target must be a kicked attempt (else 409
        ATTEMPT_NOT_KICKED) whose async grade job has already landed (else
        409 ATTEMPT_NOT_GRADED - try again shortly). Audited and idempotent -
        a repeat override of the same attempt answers 200 without zeroing a
        second time or writing a second audit row. Policy: the quiz owner or
        any admin; a non-owning teacher reads 404, so an attempt's existence
        never leaks. The reason is required.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason:
                  type: string
                  minLength: 1
                  description: Why the score is being overridden (canned phrase plus optional free text).
      responses:
        "200":
          description: The attempt, unchanged; its score is now zeroed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttemptResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: >-
            ATTEMPT_NOT_KICKED - the target attempt was never kicked; or
            ATTEMPT_NOT_GRADED - the attempt has not finished grading yet.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          $ref: "#/components/responses/ValidationFailed"
  /api/v1/attempts/{id}/result:
    get:
      operationId: getAttemptResult
      summary: The released review for an attempt (owner)
      description: >-
        The score, the per-question grading, and - only here, per the
        documented exception to answer-key isolation - the correct answers.
        Refused with 409 RESULTS_NOT_RELEASED until the quiz's results are
        released and this attempt is graded. Owner-only; anyone else reads
        404. Questions come back in the same per-attempt order the player
        showed.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: The released result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttemptResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/ResultsNotReleased"
  /api/v1/questions/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    patch:
      operationId: updateQuestion
      summary: Replace a question's content while its quiz is a draft (owner)
      description: >-
        The full question content arrives every time (the editor autosaves
        whole-question state), so validation always sees a complete question.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuestionInput"
      responses:
        "200":
          description: The updated question.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuestionResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/NotEditable"
        "422":
          $ref: "#/components/responses/ValidationFailed"
    delete:
      operationId: deleteQuestion
      summary: Remove a question from a draft quiz (owner)
      description: Remaining positions are re-densified.
      responses:
        "204":
          description: Question removed.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/NotEditable"
components:
  responses:
    Unauthorized:
      description: Missing, invalid, or expired credentials.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    ValidationFailed:
      description: Body-level validation failed; see fields.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Forbidden:
      description: The policy denies this action for the caller's role.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: >-
        No such resource. Also the answer for resources the caller is not
        assigned to, so existence is never leaked.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotEditable:
      description: >-
        QUIZ_NOT_EDITABLE - the quiz has been published; its question set is
        an immutable snapshot and drafts-only operations are refused.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    AttemptConflict:
      description: >-
        The attempt state refuses this action; the client switches on code -
        QUIZ_NOT_LIVE (start outside the window), ATTEMPT_LIMIT_REACHED
        (max_attempts exhausted), ATTEMPT_DEADLINE_PASSED (write after
        deadline + grace), ATTEMPT_ALREADY_SUBMITTED (autosave against a
        terminal attempt), or ATTEMPT_KICKED (show the lockout screen).
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    ImportNotReady:
      description: >-
        IMPORT_NOT_READY - the import is not in status "ready" (still
        validating, failed validation, or already committed), so it cannot
        be committed.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    QuizNotClosed:
      description: >-
        QUIZ_NOT_CLOSED - results can be released once the quiz's window has
        ended.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    ResultsNotReleased:
      description: >-
        RESULTS_NOT_RELEASED - the quiz's results are not released yet (or
        this attempt's grading has not landed); the client shows a "results
        pending" state.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    RateLimited:
      description: Too many attempts; includes Retry-After.
      headers:
        Retry-After:
          schema:
            type: integer
          description: Seconds until the next attempt is allowed.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
  schemas:
    AuditEntry:
      type: object
      required: [id, action, resource_type, detail, at]
      properties:
        id:
          type: integer
          format: int64
          description: The bigserial primary key; also the pagination cursor.
        actor_id:
          type: string
          format: uuid
          description: The account that performed the action; omitted when the column is null (system action).
        action:
          type: string
          description: The action verb, e.g. quizzes.published, attempt.kicked.
        resource_type:
          type: string
        resource_id:
          type: string
          format: uuid
          description: Omitted when the column is null.
        detail:
          nullable: true
          description: Free-form JSON detail (includes the diff for mutations); null when the writer recorded none.
        at:
          type: string
          format: date-time
    AuditPage:
      type: object
      required: [entries, next_cursor]
      properties:
        entries:
          type: array
          items:
            $ref: "#/components/schemas/AuditEntry"
        next_cursor:
          type: integer
          format: int64
          nullable: true
          description: Pass as `before` to fetch the next page; null on the last page.
    Health:
      type: object
      required: [status, version, commit, time, checks]
      properties:
        status:
          type: string
          enum: [ok, error]
        version:
          type: string
        commit:
          type: string
        time:
          type: string
          format: date-time
        checks:
          type: object
          properties:
            database:
              type: string
            redis:
              type: string
            queue_lag_seconds:
              type: number
    Ready:
      type: object
      required: [status]
      properties:
        status:
          type: string
    DeployCheck:
      type: object
      required: [safe_to_deploy, live_quiz_count]
      properties:
        safe_to_deploy:
          type: boolean
        live_quiz_count:
          type: integer
        reason:
          type: string
    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          description: >-
            Stable machine-readable code from the docs/04-api.md vocabulary,
            e.g. INVALID_CREDENTIALS, UNAUTHENTICATED, VALIDATION_FAILED,
            RATE_LIMITED, PASSWORD_CHANGE_REQUIRED, NOT_FOUND.
        message:
          type: string
        fields:
          type: object
          additionalProperties:
            type: string
          description: Per-field messages for VALIDATION_FAILED.
    User:
      type: object
      required:
        [id, role, email, full_name, status, must_change_password, created_at]
      properties:
        id:
          type: string
          format: uuid
        role:
          type: string
          enum: [admin, teacher, student]
        email:
          type: string
          format: email
        full_name:
          type: string
        status:
          type: string
          enum: [active, disabled]
        must_change_password:
          type: boolean
          description: >-
            True while the account still uses its admin-issued credential;
            every endpoint except auth answers 403 PASSWORD_CHANGE_REQUIRED
            until the user sets their own password.
        created_at:
          type: string
          format: date-time
    Session:
      type: object
      required: [user]
      properties:
        user:
          $ref: "#/components/schemas/User"
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    ChangePasswordRequest:
      type: object
      required: [current_password, new_password]
      properties:
        current_password:
          type: string
        new_password:
          type: string
          minLength: 10
    CreateUserRequest:
      type: object
      required: [role, email, full_name]
      properties:
        role:
          type: string
          enum: [teacher, student]
        email:
          type: string
          format: email
        full_name:
          type: string
    UpdateUserRequest:
      type: object
      properties:
        full_name:
          type: string
        status:
          type: string
          enum: [active, disabled]
        reset_password:
          type: boolean
          description: Issue a fresh one-time credential and revoke all sessions.
    ProvisionedUser:
      type: object
      required: [user]
      properties:
        user:
          $ref: "#/components/schemas/User"
        initial_password:
          type: string
          description: >-
            The generated one-time credential. Returned exactly once, never
            stored in the clear, never retrievable again.
    Quiz:
      type: object
      required:
        [
          id,
          owner_id,
          title,
          status,
          starts_at,
          ends_at,
          duration_sec,
          max_attempts,
          shuffle_questions,
          published_at,
          version,
          created_at,
          question_count,
          release_policy,
          results_released_at,
        ]
      properties:
        id:
          type: string
          format: uuid
        owner_id:
          type: string
          format: uuid
        title:
          type: string
        status:
          type: string
          enum: [draft, scheduled, live, closed, archived]
        starts_at:
          type: string
          format: date-time
          nullable: true
        ends_at:
          type: string
          format: date-time
          nullable: true
        duration_sec:
          type: integer
          nullable: true
        max_attempts:
          type: integer
        shuffle_questions:
          type: boolean
        published_at:
          type: string
          format: date-time
          nullable: true
        version:
          type: integer
        created_at:
          type: string
          format: date-time
        question_count:
          type: integer
        release_policy:
          type: string
          enum: [auto, manual]
          description: >-
            When scores become visible to students - auto releases in the
            worker pass that grades the closed quiz, manual waits for
            POST /quizzes/{id}/release-results.
        results_released_at:
          type: string
          format: date-time
          nullable: true
          description: Null means scores and the answer key are withheld.
    QuestionBody:
      type: object
      required: [text]
      properties:
        text:
          type: string
        image_ref:
          type: string
    QuestionOption:
      type: object
      required: [key, text]
      properties:
        key:
          type: string
        text:
          type: string
    Question:
      type: object
      description: >-
        A question as any client may see it. The answer key is NOT part of
        this schema; only the owner-facing TeacherQuestion carries it, and
        the student serializer strips it structurally.
      required: [id, quiz_id, position, type, body, points, source]
      properties:
        id:
          type: string
          format: uuid
        quiz_id:
          type: string
          format: uuid
        position:
          type: integer
        type:
          type: string
          enum: [single, multi, truefalse, short]
        body:
          $ref: "#/components/schemas/QuestionBody"
        options:
          type: array
          items:
            $ref: "#/components/schemas/QuestionOption"
        points:
          type: number
        source:
          type: string
          enum: [manual, import]
    TeacherQuestion:
      allOf:
        - $ref: "#/components/schemas/Question"
        - type: object
          required: [correct]
          properties:
            correct:
              description: >-
                The answer key. The option key (single), option keys
                (multi), a boolean (truefalse), or {accepted: [...]}
                (short). Owner-facing responses only.
    QuestionInput:
      type: object
      required: [type, body, correct]
      properties:
        type:
          type: string
          enum: [single, multi, truefalse, short]
        body:
          $ref: "#/components/schemas/QuestionBody"
        options:
          type: array
          description: Required for single/multi (2-8 entries); omitted otherwise.
          items:
            $ref: "#/components/schemas/QuestionOption"
        correct:
          description: >-
            The answer key; shape depends on type. Must reference existing
            option keys for choice types.
        points:
          type: number
          description: Defaults to 1; must be positive.
    UpdateQuizRequest:
      type: object
      properties:
        title:
          type: string
        max_attempts:
          type: integer
          minimum: 1
          maximum: 10
        shuffle_questions:
          type: boolean
    QuizResponse:
      type: object
      required: [quiz]
      properties:
        quiz:
          $ref: "#/components/schemas/Quiz"
    QuizDetail:
      type: object
      required: [quiz, questions]
      properties:
        quiz:
          $ref: "#/components/schemas/Quiz"
        questions:
          type: array
          items:
            $ref: "#/components/schemas/TeacherQuestion"
    QuestionResponse:
      type: object
      required: [question]
      properties:
        question:
          $ref: "#/components/schemas/TeacherQuestion"
    Import:
      type: object
      description: >-
        A registered bulk upload (docs/07 section 2). status moves
        validating -> ready|failed -> committed; row_count and error_report
        are null until the worker's validation pass resolves it.
      required: [id, quiz_id, uploaded_by, status, created_at]
      properties:
        id:
          type: string
          format: uuid
        quiz_id:
          type: string
          format: uuid
        uploaded_by:
          type: string
          format: uuid
        status:
          type: string
          enum: [validating, ready, failed, committed]
        row_count:
          type: integer
          nullable: true
        error_report:
          type: array
          nullable: true
          items:
            type: object
            required: [row, column, message]
            properties:
              row:
                type: integer
              column:
                type: string
              message:
                type: string
        created_at:
          type: string
          format: date-time
    ImportResponse:
      type: object
      required: [import]
      properties:
        import:
          $ref: "#/components/schemas/Import"
    CommitImportResponse:
      type: object
      description: >-
        docs/07 section 2 step 5: the import, now status "committed", plus
        the questions it inserted (tagged source "import" with import_id for
        provenance).
      required: [import, questions]
      properties:
        import:
          $ref: "#/components/schemas/Import"
        questions:
          type: array
          items:
            $ref: "#/components/schemas/TeacherQuestion"
    QuizStats:
      type: object
      description: >-
        The quiz_stats row for the wire (docs/03-data-model.md). Frozen at
        close by RollupDue; a dashboard read is one primary-key lookup, never
        a live recompute.
      required:
        - quiz_id
        - distribution
        - mean
        - median
        - participation
        - item_analysis
        - integrity
        - computed_at
      properties:
        quiz_id:
          type: string
          format: uuid
        distribution:
          type: array
          description: >-
            10 equal-width percentage-of-max-score buckets (0-10%, 10-20%, ...,
            90-100%), each the count of best-attempt scores falling in it.
          items:
            type: integer
        mean:
          type: number
          nullable: true
        median:
          type: number
          nullable: true
        participation:
          type: number
          nullable: true
          description: Fraction of assigned students with a graded attempt.
        item_analysis:
          type: array
          items:
            $ref: "#/components/schemas/ItemStat"
        integrity:
          $ref: "#/components/schemas/IntegritySummary"
        computed_at:
          type: string
          format: date-time
    ItemStat:
      type: object
      description: One question's row in item_analysis, over each student's best graded attempt.
      required:
        - question_id
        - responses
        - p_value
        - point_biserial
        - option_pick_rates
        - avg_time_ms
      properties:
        question_id:
          type: string
          format: uuid
        responses:
          type: integer
        p_value:
          type: number
          description: Fraction of responses that were correct (difficulty).
        point_biserial:
          type: number
          nullable: true
          description: Item-discrimination correlation; null when undefined.
        option_pick_rates:
          type: object
          additionalProperties:
            type: integer
        avg_time_ms:
          type: number
    IntegritySummary:
      type: object
      required:
        - kicked_attempts
        - flagged_students
        - total_violations
        - per_student
      properties:
        kicked_attempts:
          type: integer
        flagged_students:
          type: integer
        total_violations:
          type: integer
        per_student:
          type: array
          items:
            $ref: "#/components/schemas/IntegrityStudent"
    IntegrityStudent:
      type: object
      required: [student_id, violations, kicked]
      properties:
        student_id:
          type: string
          format: uuid
        violations:
          type: integer
        kicked:
          type: boolean
    StudentStats:
      type: object
      description: The student_stats row for the wire (docs/03-data-model.md).
      required:
        - student_id
        - accuracy_trend
        - avg_time_per_question
        - completion_rate
        - topic_strengths
        - updated_at
      properties:
        student_id:
          type: string
          format: uuid
        accuracy_trend:
          type: array
          description: The student's best-attempt accuracy per terminal quiz, submission-ordered.
          items:
            type: object
            required: [quiz_id, accuracy, submitted_at]
            properties:
              quiz_id:
                type: string
                format: uuid
              accuracy:
                type: number
                nullable: true
              submitted_at:
                type: string
                format: date-time
        avg_time_per_question:
          type: number
          nullable: true
        completion_rate:
          type: number
          nullable: true
        topic_strengths:
          type: object
          description: Reserved; always an empty object today (no topic taxonomy yet).
        updated_at:
          type: string
          format: date-time
    TeacherStats:
      type: object
      description: >-
        A teacher's activity-and-outcomes summary (docs/07 section 4),
        aggregated live rather than from a rollup table.
      required:
        - teacher_id
        - quizzes_created
        - quizzes_conducted
        - total_attempts
        - avg_participation
        - avg_class_score
        - avg_publish_to_results_sec
      properties:
        teacher_id:
          type: string
          format: uuid
        quizzes_created:
          type: integer
        quizzes_conducted:
          type: integer
        total_attempts:
          type: integer
        avg_participation:
          type: number
          nullable: true
        avg_class_score:
          type: number
          nullable: true
          description: Mean of each quiz's raw-point mean; not a percentage.
        avg_publish_to_results_sec:
          type: number
          nullable: true
    OrgStats:
      type: object
      description: >-
        The admin org-wide dashboard (docs/07 section 4, FR-9). Every field is
        computed live: there is no org_stats rollup table.
      required:
        - active_users
        - quizzes_per_week
        - platform_participation
        - cohort_comparisons
      properties:
        active_users:
          type: object
          required: [admins, teachers, students]
          properties:
            admins:
              type: integer
            teachers:
              type: integer
            students:
              type: integer
        quizzes_per_week:
          type: array
          description: >-
            Quizzes created per week over the trailing 12 weeks, oldest
            first. A week with no quizzes created is simply absent.
          items:
            type: object
            required: [week_start, count]
            properties:
              week_start:
                type: string
                format: date-time
              count:
                type: integer
        platform_participation:
          type: number
          nullable: true
          description: Mean participation across every rolled-up quiz_stats row.
        cohort_comparisons:
          type: array
          items:
            $ref: "#/components/schemas/CohortStats"
    CohortStats:
      type: object
      description: >-
        One group's members compared against the platform-wide
        student-analytics profile.
      required:
        - group_id
        - group_name
        - member_count
        - avg_completion_rate
        - avg_accuracy
      properties:
        group_id:
          type: string
          format: uuid
        group_name:
          type: string
        member_count:
          type: integer
        avg_completion_rate:
          type: number
          nullable: true
        avg_accuracy:
          type: number
          nullable: true
    Group:
      type: object
      required: [id, name, member_count, created_at]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        member_count:
          type: integer
        created_at:
          type: string
          format: date-time
    GroupResponse:
      type: object
      required: [group]
      properties:
        group:
          $ref: "#/components/schemas/Group"
    DirectoryResponse:
      type: object
      description: >-
        The audience picker's world - active students plus cohorts. Students
        share the AssignedStudent shape, so the picker and the assigned
        audience list render from one type.
      required: [students, groups]
      properties:
        students:
          type: array
          items:
            $ref: "#/components/schemas/AssignedStudent"
        groups:
          type: array
          items:
            $ref: "#/components/schemas/Group"
    Guardrails:
      type: object
      description: >-
        Per-quiz anti-cheat config, snapshotted with the question set at
        publish so rules cannot change under a student mid-window.
      required:
        [fullscreen, focus_tracking, block_clipboard, max_violations,
         violation_action]
      properties:
        fullscreen:
          type: string
          enum: [off, warn, count]
        focus_tracking:
          type: string
          enum: [off, warn, count]
        block_clipboard:
          type: boolean
        max_violations:
          type: integer
          minimum: 1
          maximum: 100
        violation_action:
          type: string
          enum: [flag, auto_submit, notify]
    PublishQuizRequest:
      type: object
      required: [starts_at, ends_at, duration_sec]
      properties:
        starts_at:
          type: string
          format: date-time
          description: Go-live moment; must be in the future.
        ends_at:
          type: string
          format: date-time
          description: Hard close; must be after starts_at.
        duration_sec:
          type: integer
          minimum: 30
          maximum: 86400
          description: >-
            Per-attempt time budget; a student starting late gets
            min(duration, time-to-close).
        guardrails:
          $ref: "#/components/schemas/Guardrails"
        release_policy:
          type: string
          enum: [auto, manual]
          description: >-
            When scores become visible to students - auto (the default when
            omitted) releases at close once grading lands, manual waits for
            the teacher's explicit release.
    SetAssignmentsRequest:
      type: object
      properties:
        student_ids:
          type: array
          items:
            type: string
            format: uuid
        group_ids:
          type: array
          description: Expanded to individual student rows at assignment time.
          items:
            type: string
            format: uuid
    AssignedStudent:
      type: object
      required: [id, full_name, email]
      properties:
        id:
          type: string
          format: uuid
        full_name:
          type: string
        email:
          type: string
          format: email
    AssignmentsResponse:
      type: object
      required: [students]
      properties:
        students:
          type: array
          items:
            $ref: "#/components/schemas/AssignedStudent"
    Attempt:
      type: object
      description: >-
        The student-facing attempt shape. The owner is always the caller and
        the score is withheld until the results-release policy lands with
        grading, so neither appears here.
      required:
        [id, quiz_id, attempt_no, quiz_version, started_at, deadline_at,
         submitted_at, submit_kind, status, violation_count]
      properties:
        id:
          type: string
          format: uuid
        quiz_id:
          type: string
          format: uuid
        attempt_no:
          type: integer
        quiz_version:
          type: integer
          description: Pins the snapshot the student saw.
        started_at:
          type: string
          format: date-time
        deadline_at:
          type: string
          format: date-time
          description: >-
            least(started_at + duration, quiz.ends_at); precomputed once at
            start, the single column every write validates against.
        submitted_at:
          type: string
          format: date-time
          nullable: true
        submit_kind:
          type: string
          enum: [manual, auto, forced, kicked]
          nullable: true
        status:
          type: string
          enum: [in_progress, submitted, graded, kicked]
        violation_count:
          type: integer
    AttemptQuestion:
      type: object
      description: >-
        One snapshot question as the player sees it. The answer key is
        structurally absent; when the quiz shuffles, positions are
        renumbered densely in the per-attempt order.
      required: [id, position, type, body, points]
      properties:
        id:
          type: string
          format: uuid
        position:
          type: integer
        type:
          type: string
          enum: [single, multi, truefalse, short]
        body:
          $ref: "#/components/schemas/QuestionBody"
        options:
          type: array
          items:
            $ref: "#/components/schemas/QuestionOption"
        points:
          type: number
    AttemptAnswer:
      type: object
      required: [question_id, response, time_spent_ms, saved_at]
      properties:
        question_id:
          type: string
          format: uuid
        response:
          description: >-
            The autosaved response; shape depends on question type - the
            option key (single), option keys (multi), a boolean (truefalse),
            or a string (short).
        time_spent_ms:
          type: integer
        saved_at:
          type: string
          format: date-time
    AttemptDetail:
      type: object
      description: >-
        The full player payload - attempt, quiz identity, snapshotted
        guardrails, questions without the answer key, saved answers, and
        the server clock for the cosmetic countdown.
      required: [attempt, quiz_title, guardrails, questions, answers, now]
      properties:
        attempt:
          $ref: "#/components/schemas/Attempt"
        quiz_title:
          type: string
        guardrails:
          $ref: "#/components/schemas/Guardrails"
        questions:
          type: array
          items:
            $ref: "#/components/schemas/AttemptQuestion"
        answers:
          type: array
          items:
            $ref: "#/components/schemas/AttemptAnswer"
        now:
          type: string
          format: date-time
          description: Current server time, for the clock-offset estimate.
    SaveAnswerRequest:
      type: object
      required: [response]
      properties:
        response:
          description: The response value; shape depends on question type.
        time_spent_ms:
          type: integer
          minimum: 0
          description: Accumulated focus time on this question, for analytics.
    SaveAnswerResponse:
      type: object
      required: [answer, deadline_at, now]
      properties:
        answer:
          $ref: "#/components/schemas/AttemptAnswer"
        deadline_at:
          type: string
          format: date-time
        now:
          type: string
          format: date-time
    AttemptResponse:
      type: object
      required: [attempt]
      properties:
        attempt:
          $ref: "#/components/schemas/Attempt"
    ViolationResponse:
      type: object
      required: [attempt, counted]
      properties:
        attempt:
          $ref: "#/components/schemas/Attempt"
        counted:
          type: boolean
          description: >-
            Whether this report incremented violation_count (true only for a
            guardrail whose snapshotted policy is `count`).
    AssignedQuiz:
      type: object
      description: >-
        The student-facing quiz shape - window, budget, size, and the
        caller's own attempt history. Never the owner, the guardrail
        internals, or (structurally) a question.
      required:
        [id, title, status, starts_at, ends_at, duration_sec, max_attempts,
         version, question_count, results_released_at, attempts]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        status:
          type: string
          enum: [scheduled, live, closed]
          description: Derived from the window on read.
        starts_at:
          type: string
          format: date-time
        ends_at:
          type: string
          format: date-time
        duration_sec:
          type: integer
        max_attempts:
          type: integer
        version:
          type: integer
        question_count:
          type: integer
        results_released_at:
          type: string
          format: date-time
          nullable: true
          description: Null means scores are withheld.
        attempts:
          type: array
          description: The caller's own attempts, oldest first.
          items:
            $ref: "#/components/schemas/AttemptSummary"
    AttemptSummary:
      type: object
      description: >-
        One of the caller's own attempts as the assigned list shows it.
        score stays null until the quiz's results are released.
      required: [id, attempt_no, status, started_at, submitted_at, score]
      properties:
        id:
          type: string
          format: uuid
        attempt_no:
          type: integer
        status:
          type: string
          enum: [in_progress, submitted, graded, kicked]
        started_at:
          type: string
          format: date-time
        submitted_at:
          type: string
          format: date-time
          nullable: true
        score:
          type: number
          nullable: true
    ResultRow:
      type: object
      description: >-
        One line of the teacher's results table - an assigned student and
        one of their attempts. Students who never started keep the attempt
        fields null.
      required:
        [student_id, full_name, email, attempt_id, attempt_no, status,
         submit_kind, started_at, submitted_at, score, max_score,
         score_overridden]
      properties:
        student_id:
          type: string
          format: uuid
        full_name:
          type: string
        email:
          type: string
          format: email
        attempt_id:
          type: string
          format: uuid
          nullable: true
        attempt_no:
          type: integer
          nullable: true
        status:
          type: string
          enum: [in_progress, submitted, graded, kicked]
          nullable: true
        submit_kind:
          type: string
          enum: [manual, auto, forced, kicked]
          nullable: true
        started_at:
          type: string
          format: date-time
          nullable: true
        submitted_at:
          type: string
          format: date-time
          nullable: true
        score:
          type: number
          nullable: true
        max_score:
          type: number
          nullable: true
          description: Total points of the snapshot version this attempt pinned.
        score_overridden:
          type: boolean
          description: >-
            True once the teacher has overridden this attempt's score to zero
            (docs/06 line 80, POST /attempts/:id/override-score) - only ever
            true for a kicked attempt.
    QuizResultsResponse:
      type: object
      required: [quiz, results]
      properties:
        quiz:
          $ref: "#/components/schemas/Quiz"
        results:
          type: array
          items:
            $ref: "#/components/schemas/ResultRow"
    LiveRosterRow:
      type: object
      description: >-
        One roster cell - an assigned student and their latest attempt.
        Students who never started read as not_started with the attempt
        fields null. state collapses the attempt status to the dashboard
        vocabulary; graded folds into submitted. disconnected is in_progress
        plus a stale heartbeat (docs/05 section 5) - the deadline clock keeps
        running.
      required:
        [student_id, full_name, email, state, attempt_id, attempt_no, status,
         submit_kind, started_at, deadline_at, answered_count,
         current_question, question_count, violation_count, score, max_score]
      properties:
        student_id:
          type: string
          format: uuid
        full_name:
          type: string
        email:
          type: string
          format: email
        state:
          type: string
          enum: [not_started, in_progress, disconnected, submitted, kicked]
        attempt_id:
          type: string
          format: uuid
          nullable: true
        attempt_no:
          type: integer
          nullable: true
        status:
          type: string
          enum: [in_progress, submitted, graded, kicked]
          nullable: true
        submit_kind:
          type: string
          enum: [manual, auto, forced, kicked]
          nullable: true
        started_at:
          type: string
          format: date-time
          nullable: true
        deadline_at:
          type: string
          format: date-time
          nullable: true
        answered_count:
          type: integer
          nullable: true
          description: Questions with a non-null saved response.
        current_question:
          type: integer
          nullable: true
          description: >-
            1-based ordinal (within the pinned quiz_version's questions array)
            of the last question the student saved an answer for. Null until
            the first autosave.
        question_count:
          type: integer
          nullable: true
          description: Question count of the snapshot version this attempt pinned.
        violation_count:
          type: integer
          nullable: true
        score:
          type: number
          nullable: true
        max_score:
          type: number
          nullable: true
          description: Total points of the snapshot version this attempt pinned.
    LiveRosterResponse:
      type: object
      required: [quiz, roster, server_time]
      properties:
        quiz:
          $ref: "#/components/schemas/Quiz"
        roster:
          type: array
          items:
            $ref: "#/components/schemas/LiveRosterRow"
        server_time:
          type: string
          format: date-time
          description: The database clock the row timestamps were read against.
    ResultQuestion:
      type: object
      description: >-
        One snapshot question in the released review - what was asked, what
        the student answered, the key, and what it earned. Unanswered
        questions keep response and is_correct null.
      required:
        [id, position, type, body, correct, points, response, is_correct,
         points_awarded]
      properties:
        id:
          type: string
          format: uuid
        position:
          type: integer
        type:
          type: string
          enum: [single, multi, truefalse, short]
        body:
          $ref: "#/components/schemas/QuestionBody"
        options:
          type: array
          items:
            $ref: "#/components/schemas/QuestionOption"
        correct:
          description: >-
            The answer key - exposed here only, after close and release
            (the documented exception to answer-key isolation).
        points:
          type: number
        response:
          nullable: true
          description: The autosaved response; shape depends on question type.
        is_correct:
          type: boolean
          nullable: true
        points_awarded:
          type: number
    AttemptResult:
      type: object
      description: >-
        The released results payload for one attempt. The attempt keeps its
        usual score-free shape; the released score rides at the top level.
      required:
        [attempt, quiz_title, score, score_overridden, max_score, percentile,
         released_at, questions]
      properties:
        attempt:
          $ref: "#/components/schemas/Attempt"
        quiz_title:
          type: string
        score:
          type: number
        score_overridden:
          type: boolean
          description: >-
            True once the teacher has overridden this attempt's score to zero
            (docs/06 line 80) - only ever true for a kicked attempt.
        max_score:
          type: number
        percentile:
          type: number
          nullable: true
          description: >-
            This attempt's score, ranked against the quiz's score
            distribution (docs/07 section 3, "score and percentile per
            quiz"). Bucket-granular (derived from the 10-bucket quiz_stats
            histogram, not an exact rank) and null when no points are
            possible on the quiz or the quiz_stats rollup hasn't landed yet.
        released_at:
          type: string
          format: date-time
        questions:
          type: array
          items:
            $ref: "#/components/schemas/ResultQuestion"
