# MacQuiz v2 API contract (docs/04-api.md).
# Spec-first: oapi-codegen generates the Go server interfaces and the
# TypeScript client from this file, so frontend and backend cannot drift.
# Endpoints are added milestone by milestone; today it covers Milestone 0.
openapi: 3.0.3
info:
  title: MacQuiz v2 API
  description: Quiz platform for admins, teachers, and students.
  version: 0.1.0
servers:
  - url: /
paths:
  /healthz:
    get:
      operationId: getHealth
      summary: Liveness check
      description: >-
        Reports that the process is up. Deliberately checks no dependencies;
        readiness probes arrive with the database wiring in Milestone 1.
      responses:
        "200":
          description: Process is alive.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"
components:
  schemas:
    Health:
      type: object
      required: [status, version, commit, time]
      properties:
        status:
          type: string
          enum: [ok]
        version:
          type: string
        commit:
          type: string
        time:
          type: string
          format: date-time
