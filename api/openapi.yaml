# MacQuiz v2 API contract (docs/04-api.md).
# Spec-first: oapi-codegen generates the Go server interfaces and the
# TypeScript client from this file, so frontend and backend cannot drift.
# Endpoints are added milestone by milestone; today it covers Milestone 0,
# Milestone 1 (auth flow, admin user provisioning, groups), and Milestone 2
# (quiz authoring: draft quiz CRUD, question CRUD, reorder).
openapi: 3.0.3
info:
  title: MacQuiz v2 API
  description: Quiz platform for admins, teachers, and students.
  version: 0.4.0
servers:
  - url: /
paths:
  /healthz:
    get:
      operationId: getHealth
      summary: Liveness check
      description: >-
        Reports that the process is up. Deliberately checks no dependencies;
        use /readyz to know whether the process can serve real traffic.
      responses:
        "200":
          description: Process is alive.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"
  /readyz:
    get:
      operationId: getReady
      summary: Readiness check
      description: Reports whether the process can serve traffic (Postgres answers).
      responses:
        "200":
          description: Ready.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ready"
        "503":
          description: Not ready; keep traffic away.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ready"
  /api/v1/auth/login:
    post:
      operationId: login
      summary: Log in with email and password
      description: >-
        Verifies the credential and opens a session. The access token (15 min
        JWT) and rotating refresh token are set as httpOnly cookies; the body
        carries only the user. Rate-limited per IP and per account.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Session opened; cookies set.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationFailed"
        "429":
          $ref: "#/components/responses/RateLimited"
  /api/v1/auth/refresh:
    post:
      operationId: refreshSession
      summary: Rotate the refresh token and mint a new access token
      description: >-
        Uses the refresh cookie. Presenting an already-used or revoked token
        is treated as theft and revokes the whole session family.
      responses:
        "200":
          description: Session rotated; new cookies set.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/v1/auth/logout:
    post:
      operationId: logout
      summary: Revoke the session and clear cookies
      responses:
        "204":
          description: Session revoked. Always succeeds, even without a session.
  /api/v1/auth/me:
    get:
      operationId: getMe
      summary: The authenticated account
      responses:
        "200":
          description: The caller's account.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/v1/auth/password:
    post:
      operationId: changePassword
      summary: Change the caller's password
      description: >-
        Verifies the current password, stores the new one, clears the forced
        first-login reset flag, and revokes every session; the client logs in
        again with the new credential.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordRequest"
      responses:
        "204":
          description: Password changed; all sessions revoked, cookies cleared.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationFailed"
  /api/v1/users:
    get:
      operationId: listUsers
      summary: List accounts (admin)
      parameters:
        - name: role
          in: query
          schema:
            type: string
            enum: [admin, teacher, student]
        - name: status
          in: query
          schema:
            type: string
            enum: [active, disabled]
      responses:
        "200":
          description: Accounts, newest first.
          content:
            application/json:
              schema:
                type: object
                required: [users]
                properties:
                  users:
                    type: array
                    items:
                      $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationFailed"
    post:
      operationId: createUser
      summary: Provision a teacher or student (admin)
      description: >-
        Creates the account with a generated one-time credential, returned
        exactly once in this response. The account must change its password
        on first login before any other endpoint works. Admin accounts are
        created only by the operator bootstrap, never over the API.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: Account created; initial_password appears only here.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProvisionedUser"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationFailed"
  /api/v1/users/{id}:
    patch:
      operationId: updateUser
      summary: Deactivate, reset the credential, or edit an account (admin)
      description: >-
        Disabling an account or resetting its credential revokes every live
        session immediately. Admins cannot disable or reset themselves here;
        that path goes through the auth endpoints. Each mutation writes an
        audit row in the same transaction.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200":
          description: >-
            The updated account; initial_password is present only when
            reset_password was requested.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProvisionedUser"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationFailed"
  /api/v1/groups:
    get:
      operationId: listGroups
      summary: List cohorts with member counts (admin)
      responses:
        "200":
          description: Cohorts, newest first.
          content:
            application/json:
              schema:
                type: object
                required: [groups]
                properties:
                  groups:
                    type: array
                    items:
                      $ref: "#/components/schemas/Group"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      operationId: createGroup
      summary: Create a cohort (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
      responses:
        "201":
          description: Cohort created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationFailed"
  /api/v1/groups/{id}/members:
    put:
      operationId: setGroupMembers
      summary: Replace a cohort's membership (admin)
      description: >-
        Replaces the membership with exactly student_ids, validated and
        swapped in one transaction - a single bad id changes nothing. An
        empty list clears the cohort.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [student_ids]
              properties:
                student_ids:
                  type: array
                  items:
                    type: string
                    format: uuid
      responses:
        "200":
          description: Membership replaced.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationFailed"
  /api/v1/quizzes:
    get:
      operationId: listQuizzes
      summary: List the caller's own quizzes (teacher)
      description: Newest first, with question counts. Authoring is teacher-only.
      responses:
        "200":
          description: The caller's quizzes.
          content:
            application/json:
              schema:
                type: object
                required: [quizzes]
                properties:
                  quizzes:
                    type: array
                    items:
                      $ref: "#/components/schemas/Quiz"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      operationId: createQuiz
      summary: Create a draft quiz (teacher)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title:
                  type: string
      responses:
        "201":
          description: Draft created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuizResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationFailed"
  /api/v1/quizzes/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      operationId: getQuiz
      summary: One quiz with its full question list (owner)
      description: >-
        Owner-only; the questions include the answer keys. Non-owners get
        404, never 403, so quiz existence is not leaked.
      responses:
        "200":
          description: The quiz and its questions in position order.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuizDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateQuiz
      summary: Edit draft settings (owner)
      description: >-
        Title, max_attempts, and shuffle_questions are editable while the
        quiz is a draft. Windows, duration, and guardrails are set at
        publish time.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateQuizRequest"
      responses:
        "200":
          description: The updated quiz.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuizResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/NotEditable"
        "422":
          $ref: "#/components/responses/ValidationFailed"
    delete:
      operationId: deleteQuiz
      summary: Delete a draft quiz and its questions (owner)
      description: >-
        Drafts only. Quizzes that ever left draft are never deleted -
        attempts may reference them; archiving is their retirement path.
      responses:
        "204":
          description: Draft deleted.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/NotEditable"
  /api/v1/quizzes/{id}/questions:
    post:
      operationId: addQuestion
      summary: Add a question to a draft quiz (owner)
      description: >-
        Validated per type - a correct answer must exist among the options,
        points > 0, choice types need 2-8 options. The question is appended
        at the end of the running order.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuestionInput"
      responses:
        "201":
          description: Question added.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuestionResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/NotEditable"
        "422":
          $ref: "#/components/responses/ValidationFailed"
  /api/v1/quizzes/{id}/questions/order:
    put:
      operationId: reorderQuestions
      summary: Reorder a draft quiz's questions (owner)
      description: >-
        question_ids must list every question of the quiz exactly once; the
        API rewrites dense positions to match and returns the questions in
        the new order.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [question_ids]
              properties:
                question_ids:
                  type: array
                  items:
                    type: string
                    format: uuid
      responses:
        "200":
          description: Questions in the new order with rewritten positions.
          content:
            application/json:
              schema:
                type: object
                required: [questions]
                properties:
                  questions:
                    type: array
                    items:
                      $ref: "#/components/schemas/TeacherQuestion"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/NotEditable"
        "422":
          $ref: "#/components/responses/ValidationFailed"
  /api/v1/questions/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    patch:
      operationId: updateQuestion
      summary: Replace a question's content while its quiz is a draft (owner)
      description: >-
        The full question content arrives every time (the editor autosaves
        whole-question state), so validation always sees a complete question.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuestionInput"
      responses:
        "200":
          description: The updated question.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuestionResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/NotEditable"
        "422":
          $ref: "#/components/responses/ValidationFailed"
    delete:
      operationId: deleteQuestion
      summary: Remove a question from a draft quiz (owner)
      description: Remaining positions are re-densified.
      responses:
        "204":
          description: Question removed.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/NotEditable"
components:
  responses:
    Unauthorized:
      description: Missing, invalid, or expired credentials.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    ValidationFailed:
      description: Body-level validation failed; see fields.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Forbidden:
      description: The policy denies this action for the caller's role.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: >-
        No such resource. Also the answer for resources the caller is not
        assigned to, so existence is never leaked.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotEditable:
      description: >-
        QUIZ_NOT_EDITABLE - the quiz has been published; its question set is
        an immutable snapshot and drafts-only operations are refused.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    RateLimited:
      description: Too many attempts; includes Retry-After.
      headers:
        Retry-After:
          schema:
            type: integer
          description: Seconds until the next attempt is allowed.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
  schemas:
    Health:
      type: object
      required: [status, version, commit, time]
      properties:
        status:
          type: string
          enum: [ok]
        version:
          type: string
        commit:
          type: string
        time:
          type: string
          format: date-time
    Ready:
      type: object
      required: [status]
      properties:
        status:
          type: string
    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          description: >-
            Stable machine-readable code from the docs/04-api.md vocabulary,
            e.g. INVALID_CREDENTIALS, UNAUTHENTICATED, VALIDATION_FAILED,
            RATE_LIMITED, PASSWORD_CHANGE_REQUIRED, NOT_FOUND.
        message:
          type: string
        fields:
          type: object
          additionalProperties:
            type: string
          description: Per-field messages for VALIDATION_FAILED.
    User:
      type: object
      required:
        [id, role, email, full_name, status, must_change_password, created_at]
      properties:
        id:
          type: string
          format: uuid
        role:
          type: string
          enum: [admin, teacher, student]
        email:
          type: string
          format: email
        full_name:
          type: string
        status:
          type: string
          enum: [active, disabled]
        must_change_password:
          type: boolean
          description: >-
            True while the account still uses its admin-issued credential;
            every endpoint except auth answers 403 PASSWORD_CHANGE_REQUIRED
            until the user sets their own password.
        created_at:
          type: string
          format: date-time
    Session:
      type: object
      required: [user]
      properties:
        user:
          $ref: "#/components/schemas/User"
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    ChangePasswordRequest:
      type: object
      required: [current_password, new_password]
      properties:
        current_password:
          type: string
        new_password:
          type: string
          minLength: 10
    CreateUserRequest:
      type: object
      required: [role, email, full_name]
      properties:
        role:
          type: string
          enum: [teacher, student]
        email:
          type: string
          format: email
        full_name:
          type: string
    UpdateUserRequest:
      type: object
      properties:
        full_name:
          type: string
        status:
          type: string
          enum: [active, disabled]
        reset_password:
          type: boolean
          description: Issue a fresh one-time credential and revoke all sessions.
    ProvisionedUser:
      type: object
      required: [user]
      properties:
        user:
          $ref: "#/components/schemas/User"
        initial_password:
          type: string
          description: >-
            The generated one-time credential. Returned exactly once, never
            stored in the clear, never retrievable again.
    Quiz:
      type: object
      required:
        [
          id,
          owner_id,
          title,
          status,
          starts_at,
          ends_at,
          duration_sec,
          max_attempts,
          shuffle_questions,
          published_at,
          version,
          created_at,
          question_count,
        ]
      properties:
        id:
          type: string
          format: uuid
        owner_id:
          type: string
          format: uuid
        title:
          type: string
        status:
          type: string
          enum: [draft, scheduled, live, closed, archived]
        starts_at:
          type: string
          format: date-time
          nullable: true
        ends_at:
          type: string
          format: date-time
          nullable: true
        duration_sec:
          type: integer
          nullable: true
        max_attempts:
          type: integer
        shuffle_questions:
          type: boolean
        published_at:
          type: string
          format: date-time
          nullable: true
        version:
          type: integer
        created_at:
          type: string
          format: date-time
        question_count:
          type: integer
    QuestionBody:
      type: object
      required: [text]
      properties:
        text:
          type: string
        image_ref:
          type: string
    QuestionOption:
      type: object
      required: [key, text]
      properties:
        key:
          type: string
        text:
          type: string
    Question:
      type: object
      description: >-
        A question as any client may see it. The answer key is NOT part of
        this schema; only the owner-facing TeacherQuestion carries it, and
        the student serializer strips it structurally.
      required: [id, quiz_id, position, type, body, points, source]
      properties:
        id:
          type: string
          format: uuid
        quiz_id:
          type: string
          format: uuid
        position:
          type: integer
        type:
          type: string
          enum: [single, multi, truefalse, short]
        body:
          $ref: "#/components/schemas/QuestionBody"
        options:
          type: array
          items:
            $ref: "#/components/schemas/QuestionOption"
        points:
          type: number
        source:
          type: string
          enum: [manual, import]
    TeacherQuestion:
      allOf:
        - $ref: "#/components/schemas/Question"
        - type: object
          required: [correct]
          properties:
            correct:
              description: >-
                The answer key. The option key (single), option keys
                (multi), a boolean (truefalse), or {accepted: [...]}
                (short). Owner-facing responses only.
    QuestionInput:
      type: object
      required: [type, body, correct]
      properties:
        type:
          type: string
          enum: [single, multi, truefalse, short]
        body:
          $ref: "#/components/schemas/QuestionBody"
        options:
          type: array
          description: Required for single/multi (2-8 entries); omitted otherwise.
          items:
            $ref: "#/components/schemas/QuestionOption"
        correct:
          description: >-
            The answer key; shape depends on type. Must reference existing
            option keys for choice types.
        points:
          type: number
          description: Defaults to 1; must be positive.
    UpdateQuizRequest:
      type: object
      properties:
        title:
          type: string
        max_attempts:
          type: integer
          minimum: 1
          maximum: 10
        shuffle_questions:
          type: boolean
    QuizResponse:
      type: object
      required: [quiz]
      properties:
        quiz:
          $ref: "#/components/schemas/Quiz"
    QuizDetail:
      type: object
      required: [quiz, questions]
      properties:
        quiz:
          $ref: "#/components/schemas/Quiz"
        questions:
          type: array
          items:
            $ref: "#/components/schemas/TeacherQuestion"
    QuestionResponse:
      type: object
      required: [question]
      properties:
        question:
          $ref: "#/components/schemas/TeacherQuestion"
    Group:
      type: object
      required: [id, name, member_count, created_at]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        member_count:
          type: integer
        created_at:
          type: string
          format: date-time
    GroupResponse:
      type: object
      required: [group]
      properties:
        group:
          $ref: "#/components/schemas/Group"
