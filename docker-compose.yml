# MacQuiz v2 development stack (docs/09-deployment.md section 4).
# Production adds Caddy in front; in development the app is hit directly.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: macquiz
      POSTGRES_PASSWORD: macquiz
      POSTGRES_DB: macquiz
    # Non-default host ports so the stack coexists with host-local
    # Postgres/Redis installs; in-network services still use 5432/6379.
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U macquiz -d macquiz"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    # AOF on for session durability (docs/09-deployment.md section 4).
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # One-shot: applies embedded goose migrations, then exits. app and worker
  # wait for it, so the schema is always at head before the API takes traffic.
  migrate:
    build: ./server
    command: ["migrate"]
    environment:
      MACQUIZ_DATABASE_URL: postgres://macquiz:macquiz@postgres:5432/macquiz?sslmode=disable
      MACQUIZ_ENV: development
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # One-shot: creates the first admin account after the schema is at head.
  # Idempotent (no-op once any admin exists), so it is safe on every up.
  # These credentials are development-only; production sets real ones.
  bootstrap:
    build: ./server
    command: ["bootstrap"]
    environment:
      MACQUIZ_DATABASE_URL: postgres://macquiz:macquiz@postgres:5432/macquiz?sslmode=disable
      MACQUIZ_ENV: development
      MACQUIZ_BOOTSTRAP_ADMIN_EMAIL: admin@macquiz.local
      MACQUIZ_BOOTSTRAP_ADMIN_PASSWORD: admin-dev-password
      MACQUIZ_BOOTSTRAP_ADMIN_NAME: Dev Admin
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: "no"

  app:
    build: ./server
    command: ["serve"]
    environment:
      MACQUIZ_ADDR: ":8080"
      MACQUIZ_DATABASE_URL: postgres://macquiz:macquiz@postgres:5432/macquiz?sslmode=disable
      MACQUIZ_REDIS_URL: redis://redis:6379/0
      MACQUIZ_ENV: development
      MACQUIZ_AUTH_SECRET: dev-only-insecure-secret
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      bootstrap:
        condition: service_completed_successfully
    restart: unless-stopped

  worker:
    build: ./server
    command: ["worker"]
    environment:
      MACQUIZ_DATABASE_URL: postgres://macquiz:macquiz@postgres:5432/macquiz?sslmode=disable
      MACQUIZ_REDIS_URL: redis://redis:6379/0
      MACQUIZ_ENV: development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  pg_data:
  redis_data:
